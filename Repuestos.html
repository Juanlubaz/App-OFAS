<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Repuestos - TSP3</title>
<style>
    /* MANTENEMOS TU ESTÉTICA BASE PARA DAR CONTINUIDAD Y ORDEN */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: Arial, sans-serif; background: linear-gradient(135deg, #6fb543, #79c255); min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 20px; }
    .container { background: white; width: 100%; max-width: 900px; border-radius: 20px; padding: 40px; box-shadow: 0 6px 20px rgba(0,0,0,0.15); text-align: center; }
    .logos { display: flex; justify-content: center; align-items: center; margin-bottom: 20px; }
    .logos img { max-height: 100px; max-width: 100%; height: auto; object-fit: contain; }
    
    h1 { color: #4e7e28; margin-bottom: 10px; font-size: 26px; }
    h2 { color: #666; margin-bottom: 30px; font-size: 18px; font-weight: normal; }
    
    .button-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 25px; padding: 0 40px; margin-bottom: 30px; }
    
    /* ESTILO UNIFICADO PARA LOS BOTONES DE REPUESTOS */
    button.rep-btn { 
        padding: 22px 18px; 
        border-radius: 12px; 
        font-size: 18px; 
        border: none; 
        cursor: pointer; 
        background: #f3f3f3; 
        box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1); 
        transition: all 0.2s ease; 
        font-weight: 600; 
        color: #333; 
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 8px;
    }
    
    button.rep-btn span { font-size: 13px; color: #666; font-weight: normal; }
    button.rep-btn:hover { background: #e8e8e8; transform: translateY(-3px); border-bottom: 4px solid #4e7e28; }
    button.rep-btn:active { background: #e0e0e0; transform: translateY(1px); }

    /* ENLACE DE RETORNO AL ESTILO DE EQUIPOS */
    .back-link { display: inline-block; margin-top: 30px; color: #79c255; text-decoration: none; font-weight: bold; font-size: 16px; }
    .back-link:hover { text-decoration: underline; }

    @media (max-width: 600px) { .button-grid { grid-template-columns: 1fr; padding: 0; } }
</style>
</head>
<body>

<div class="container">
    <div class="logos">
        <img src="https://raw.githubusercontent.com/Juanlubaz/Enlaces-estructuras-TSP3/main/GESTI.png" alt="Gestiproject Logo" />
    </div>
    <h1>PROYECTO TSP3 - GESTIÓN DE REPUESTOS</h1>
    <h2>Listados de Repuestos y Materiales / Spare Parts List</h2>
    
    <div class="button-grid">
        <!-- BOTÓN 1: REP-Solubilizacion llamando al Visor Universal -->
        <button class="rep-btn" onclick="abrirConVisorUniversal('https://drive.google.com/file/d/120Q-Lm-wzcO-sr29QZMFIlxuM-HI2_50/view?usp=drive_link')">
            REP-Solubilizacion
            <span>Ver listado en el visor integrado</span>
        </button>
        
        <!-- BOTÓN 2: REP-Granulación llamando al Visor Universal -->
        <button class="rep-btn" onclick="abrirConVisorUniversal('https://drive.google.com/file/d/1EXDT3fUxU800bBzrkVYIxJC8xR56T0Ui/view?usp=drive_link')">
            REP-Granulación
            <span>Ver archivo adjunto en el visor integrado</span>
        </button>
    </div>

    <a href="principal.html" class="back-link">
        ← Back to Principal
    </a>
</div>

<script>
    // URL EXACTA DEL APPS SCRIPT EXTRAÍDA DE TU FORMULARIO DE EQUIPOS
    const VISOR_PDF_URL = 'https://script.google.com/macros/s/AKfycbx7OHOqzkSYfzCTOMdiUJKeiKu204K3Ki8keZmWghKdv1sZp0MZMb6Ngehrtn5TpBO5fw/exec';

    /* =====================================================
       ABRIR EN VISOR UNIVERSAL (IDÉNTICO A EQUIPOS)
    ===================================================== */
    function abrirConVisorUniversal(url) {
        if (!url) {
            alert('No hay ningún enlace disponible para este documento.');
            return;
        }

        const urlLimpia = String(url).trim();
        const esGoogleDrive = urlLimpia.includes('drive.google.com') || urlLimpia.includes('docs.google.com');

        if (esGoogleDrive) {
            const fileId = extraerIdGoogleDrive(urlLimpia);

            if (!fileId) {
                // Si no conseguimos extraer el ID, abrimos el enlace original por seguridad
                window.open(urlLimpia, '_blank', 'noopener,noreferrer');
                return;
            }

            const separador = VISOR_PDF_URL.includes('?') ? '&' : '?';
            const visorUrl = VISOR_PDF_URL + separador + 'id=' + encodeURIComponent(fileId);

            window.open(visorUrl, '_blank', 'noopener,noreferrer');
            return;
        }

        // Los enlaces que no son de Google Drive se abren directamente
        window.open(urlLimpia, '_blank', 'noopener,noreferrer');
    }

    /* =====================================================
       EXTRAER ID DE GOOGLE DRIVE (IDÉNTICO A EQUIPOS)
    ===================================================== */
    function extraerIdGoogleDrive(url) {
        if (!url) {
            return null;
        }

        const patrones = [
            /\/file\/d\/([a-zA-Z0-9_-]+)/,
            /\/d\/([a-zA-Z0-9_-]+)/,
            /[?&]id=([a-zA-Z0-9_-]+)/,
            /\/uc\?.*?[?&]id=([a-zA-Z0-9_-]+)/
        ];

        for (const patron of patrones) {
            const coincidencia = url.match(patron);
            if (coincidencia && coincidencia[1]) {
                return coincidencia[1];
            }
        }
        return null;
    }
</script>

</body>
</html>
