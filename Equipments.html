<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Equipments - Search Menu</title>
<style>
    /* ESTILOS BASE */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: Arial, sans-serif; background: linear-gradient(135deg, #6fb543, #79c255); min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 20px; }
    .container { background: white; width: 100%; max-width: 900px; border-radius: 20px; padding: 40px; box-shadow: 0 6px 20px rgba(0,0,0,0.15); text-align: center; }
    .logos { display: flex; justify-content: center; align-items: center; margin-bottom: 30px; flex-wrap: wrap; }
    .logos img { max-height: 120px; max-width: 100%; height: auto; width: auto; object-fit: contain; }
    h1 { color: #4e7e28; margin-bottom: 30px; font-size: 28px; }

    /* RECUADRO DE BOTONES OPCIONALES */
    .options-box {
        border: 2px dashed #79c255;
        border-radius: 15px;
        padding: 20px;
        margin-bottom: 25px;
        background-color: #f9fdf6;
    }
    .options-title { font-size: 14px; color: #4e7e28; font-weight: bold; margin-bottom: 12px; text-transform: uppercase; letter-spacing: 1px; }
    .options-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; max-width: 500px; margin: 0 auto; }

    /* CUADRO DE BÚSQUEDA */
    .search-box-container { max-width: 740px; margin: 0 auto 25px auto; }
    .search-input { width: 100%; padding: 16px 20px; border: 2px solid #e0e0e0; border-radius: 12px; font-size: 18px; outline: none; transition: border-color 0.2s ease; box-shadow: inset 0 2px 4px rgba(0,0,0,0.03); }
    .search-input:focus { border-color: #4e7e28; }

    /* CONTENEDOR DINÁMICO PARA LOS BOTONES DE LA CARPETA */
    .multi-docs-box {
        display: none;
        background: #f4fbf1;
        border: 1px solid #ccebc4;
        border-radius: 12px;
        padding: 20px;
        margin: 0 auto 25px auto;
        max-width: 740px;
        text-align: left;
    }
    .multi-docs-title { font-size: 15px; color: #4e7e28; font-weight: bold; margin-bottom: 12px; }
    .multi-docs-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 12px; }
    
    .btn-doc-link {
        background: #79c255 !important;
        color: white !important;
        font-size: 14px !important;
        padding: 12px !important;
        border-radius: 8px !important;
        box-shadow: 0 2px 5px rgba(0,0,0,0.1) !important;
        text-align: left !important;
        white-space: nowrap !important;
        overflow: hidden !important;
        text-overflow: ellipsis !important;
        display: block !important;
        width: 100% !important;
    }
    .btn-doc-link:hover { background: #609e42 !important; transform: translateY(-2px) !important; }

    /* CUADRÍCULA PARA LOS TRES BOTONES DE ACCIÓN */
    .action-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; padding: 0 20px; }

    /* ESTILO GENERAL DE LOS BOTONES */
    button { padding: 18px; border-radius: 12px; font-size: 18px; border: none; cursor: pointer; background: #f3f3f3; box-shadow: 0 4px 10px rgba(0,0,0,0.1); transition: all 0.2s ease; font-weight: 600; color: #333; }
    button:hover { background: #e8e8e8; transform: translateY(-3px); }
    button:active { background: #e0e0e0; transform: translateY(1px); }

    .btn-option { background: #fff; border: 2px solid #ccc; }
    .btn-option.active { background: #79c255; color: white; border-color: #4e7e28; }

    .back-link { display: inline-block; margin-top: 30px; color: #79c255; text-decoration: none; font-weight: bold; font-size: 16px; }
    .back-link:hover { text-decoration: underline; }

    @media (max-width: 768px) { .action-grid { grid-template-columns: 1fr; gap: 15px; padding: 0; } .options-grid { grid-template-columns: 1fr; } }
</style>
</head>
<body>

<div class="container">
    <div class="logos">
        <img src="https://raw.githubusercontent.com/Juanlubaz/Enlaces-estructuras-TSP3/main/GESTI.png" alt="Gestiproject Logo" />
    </div>
    
    <h1>Equipment Search</h1>

    <div class="options-box">
        <div class="options-title">Search Criteria</div>
        <div class="options-grid">
            <button type="button" id="btnTag" class="btn-option active" onclick="selectCriteria('tag')">TAG</button>
            <button type="button" id="btnName" class="btn-option" onclick="selectCriteria('name')">EQUIPMENT NAME</button>
        </div>
    </div>

    <div class="search-box-container">
        <input type="text" id="equipmentSearchInput" class="search-input" list="equipmentsList" placeholder="Enter TAG to look for..." oninput="hideMultiDocsBox()">
        <datalist id="equipmentsList"></datalist>
    </div>

    <div id="multiDocsBox" class="multi-docs-box">
        <div id="multiDocsTitle" class="multi-docs-title">Archivos dentro de la carpeta:</div>
        <div id="multiDocsGrid" class="multi-docs-grid"></div>
    </div>

    <div class="action-grid">
        <button type="button" onclick="executeEquipmentSearch('DATA SHEET')">DATA SHEET</button>
        <button type="button" onclick="executeEquipmentSearch('PLANOS')">PLANOS</button>
        <button type="button" onclick="executeEquipmentSearch('MANUAL')">MANUAL</button>
    </div>

    <a href="principal.html" class="back-link">← Back to Principal</a>
</div>

<script>
    let currentCriteria = 'tag';
    let remoteSheetDatabase = {}; 

    const SHEET_ID = '1xOQPbBJcmm12enAF6ln6s0bC2vAMWAQg';
    // Modificado a SELECT * para traer toda la hoja sin importar el orden físico de las columnas
    const GOOGLE_SHEET_URL = 'https://docs.google.com/spreadsheets/d/' + SHEET_ID + '/gviz/tq?tq=SELECT%20*&tqx=responseHandler:processData';

    // URL DE TU GOOGLE APPS SCRIPT PUENTE DEL PASO ANTERIOR (OBLIGATORIO)
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzfVd7zRhvmgRt6L8budTkPmNkzJUb6nukRUjyOfx6Pn8rcm8zS_oHiJyTHu7AOmMRj9w/exec";

    function loadDataDynamically() {
        const script = document.createElement('script');
        script.src = GOOGLE_SHEET_URL;
        document.body.appendChild(script);
    }

    function processData(response) {
        if (!response || !response.table || !response.table.cols || !response.table.rows) return;
        
        remoteSheetDatabase = {};
        const cols = response.table.cols;
        const rows = response.table.rows;

        // Buscamos dinámicamente en qué columna cayó cada palabra clave en tu Excel
        let equipoIdx = cols.findIndex(c => c.label && c.label.trim().toUpperCase() === 'EQUIPO');
        let dataSheetIdx = cols.findIndex(c => c.label && c.label.trim().toUpperCase() === 'DATA SHEET');
        let planosIdx = cols.findIndex(c => c.label && c.label.trim().toUpperCase() === 'PLANOS');
        let manualIdx = cols.findIndex(c => c.label && c.label.trim().toUpperCase() === 'MANUAL');

        // Si por alguna razón la etiqueta no leyó el nombre, asignamos índices por defecto típicos
        if (equipoIdx === -1) equipoIdx = 0; 
        if (dataSheetIdx === -1) dataSheetIdx = 2;
        if (planosIdx === -1) planosIdx = 3;
        if (manualIdx === -1) manualIdx = 4;

        for (let i = 0; i < rows.length; i++) {
            const row = rows[i];
            if (row.c && row.c[equipoIdx] && row.c[equipoIdx].v) {
                const equipoName = row.c[equipoIdx].v.toString().trim();
                
                // Evitamos procesar la fila de la cabecera propiamente dicha
                if (equipoName && equipoName.toUpperCase() !== 'EQUIPO') {
                    remoteSheetDatabase[equipoName] = {
                        'DATA SHEET': (row.c[dataSheetIdx] && row.c[dataSheetIdx].v) ? row.c[dataSheetIdx].v.toString().trim() : '',
                        'PLANOS':     (row.c[planosIdx] && row.c[planosIdx].v) ? row.c[planosIdx].v.toString().trim() : '',
                        'MANUAL':     (row.c[manualIdx] && row.c[manualIdx].v) ? row.c[manualIdx].v.toString().trim() : ''
                    };
                }
            }
        }
        updateDatalist();
    }

    function updateDatalist() {
        const datalist = document.getElementById('equipmentsList');
        datalist.innerHTML = ''; 
        const sortedEquipments = Object.keys(remoteSheetDatabase).sort();
        sortedEquipments.forEach(function(equipo) {
            const option = document.createElement('option');
            option.value = equipo;
            datalist.appendChild(option);
        });
    }

    function selectCriteria(criteria) {
        currentCriteria = criteria;
        hideMultiDocsBox();
        const btnTag = document.getElementById('btnTag');
        const btnName = document.getElementById('btnName');
        const inputField = document.getElementById('equipmentSearchInput');
        if (criteria === 'tag') {
            btnTag.classList.add('active');
            btnName.classList.remove('active');
            inputField.placeholder = "Enter TAG to look for...";
        } else {
            btnName.classList.add('active');
            btnTag.classList.remove('active');
            inputField.placeholder = "Enter Equipment Name to look for...";
        }
        inputField.focus();
    }

    function hideMultiDocsBox() {
        document.getElementById('multiDocsBox').style.display = 'none';
    }

    function executeEquipmentSearch(columnType) {
        hideMultiDocsBox();
        const query = document.getElementById('equipmentSearchInput').value.trim();
        if (!query) return alert("Por favor, introduce o selecciona un equipo.");

        const equipmentInfo = remoteSheetDatabase[query];
        if (!equipmentInfo) return alert("El equipo '" + query + "' no se encuentra en el inventario.");

        const targetUrl = equipmentInfo[columnType];
        if (!targetUrl || !targetUrl.startsWith('http')) {
            return alert("El equipo '" + query + "' no tiene un enlace registrado en " + columnType + ".");
        }

        const isFolder = targetUrl.includes('/folders/') || targetUrl.includes('id=');
        const isDirectFile = targetUrl.includes('/file/d/');

        if (isFolder && !isDirectFile) {
            let folderId = '';
            if (targetUrl.includes('/folders/')) {
                folderId = targetUrl.split('/folders/')[1].split('?')[0];
            } else if (targetUrl.includes('id=')) {
                folderId = targetUrl.split('id=')[1].split('&')[0];
            }

            if(SCRIPT_URL.includes("REEMPLAZA_CON_LA_URL")) {
                 return alert("Por favor, configura la URL de tu Google Apps Script en el código (Línea 137).");
            }

            const finalScriptUrl = SCRIPT_URL + "?folderId=" + folderId + "&callback=renderFolderButtons";
            const scriptNode = document.createElement('script');
            scriptNode.src = finalScriptUrl;
            document.body.appendChild(scriptNode);
        } else {
            window.open(targetUrl, '_blank');
        }
    }

    function renderFolderButtons(filesList) {
        if (!filesList || filesList.error || filesList.length === 0) {
            return alert("No se encontraron archivos accesibles dentro de esta carpeta de Drive.");
        }

        const multiBox = document.getElementById('multiDocsBox');
        const multiGrid = document.getElementById('multiDocsGrid');
        multiGrid.innerHTML = ''; 

        filesList.forEach(function(file) {
            const subBtn = document.createElement('button');
            subBtn.type = 'button';
            subBtn.className = 'btn-doc-link';
            subBtn.title = file.name;
            subBtn.innerText = "📄 " + file.name;
            subBtn.onclick = function() { window.open(file.url, '_blank'); };
            multiGrid.appendChild(subBtn);
        });

        multiBox.style.display = 'block';
    }

    window.onload = loadDataDynamically;
</script>

</body>
</html>
