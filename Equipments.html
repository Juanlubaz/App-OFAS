<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Equipments - Search Menu</title>
<style>
    /* ESTILOS BASE (Consistencia estética con tu principal.html) */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: Arial, sans-serif; background: linear-gradient(135deg, #6fb543, #79c255); min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 20px; }
    .container { background: white; width: 100%; max-width: 900px; border-radius: 20px; padding: 40px; box-shadow: 0 6px 20px rgba(0,0,0,0.15); text-align: center; }
    .logos { display: flex; justify-content: center; align-items: center; margin-bottom: 30px; flex-wrap: wrap; }
    .logos img { max-height: 120px; max-width: 100%; height: auto; width: auto; object-fit: contain; }
    h1 { color: #4e7e28; margin-bottom: 30px; font-size: 28px; }

    /* RECUADRO DE BOTONES OPCIONALES (TAG / EQUIPMENT NAME) */
    .options-box {
        border: 2px dashed #79c255;
        border-radius: 15px;
        padding: 20px;
        margin-bottom: 25px;
        background-color: #f9fdf6;
    }
    .options-title {
        font-size: 14px;
        color: #4e7e28;
        font-weight: bold;
        margin-bottom: 12px;
        text-transform: uppercase;
        letter-spacing: 1px;
    }
    .options-grid {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 15px;
        max-width: 500px;
        margin: 0 auto;
    }

    /* CUADRO DE BÚSQUEDA */
    .search-box-container {
        max-width: 740px;
        margin: 0 auto 35px auto;
    }
    .search-input {
        width: 100%;
        padding: 16px 20px;
        border: 2px solid #e0e0e0;
        border-radius: 12px;
        font-size: 18px;
        outline: none;
        transition: border-color 0.2s ease;
        box-shadow: inset 0 2px 4px rgba(0,0,0,0.03);
    }
    .search-input:focus {
        border-color: #4e7e28;
    }

    /* CUADRÍCULA PARA LOS TRES BOTONES DE ACCIÓN */
    .action-grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 20px;
        padding: 0 20px;
    }

    /* ESTILO GENERAL DE LOS BOTONES */
    button { 
        padding: 18px; 
        border-radius: 12px; 
        font-size: 18px; 
        border: none; 
        cursor: pointer; 
        background: #f3f3f3; 
        box-shadow: 0 4px 10px rgba(0,0,0,0.1); 
        transition: all 0.2s ease; 
        font-weight: 600; 
        color: #333; 
    }
    button:hover { background: #e8e8e8; transform: translateY(-3px); }
    button:active { background: #e0e0e0; transform: translateY(1px); }

    .btn-option {
        background: #fff;
        border: 2px solid #ccc;
    }
    .btn-option.active {
        background: #79c255;
        color: white;
        border-color: #4e7e28;
    }

    .back-link {
        display: inline-block;
        margin-top: 30px;
        color: #79c255;
        text-decoration: none;
        font-weight: bold;
        font-size: 16px;
    }
    .back-link:hover { text-decoration: underline; }

    @media (max-width: 768px) { 
        .action-grid { grid-template-columns: 1fr; gap: 15px; padding: 0; }
        .options-grid { grid-template-columns: 1fr; } 
    }
</style>
</head>
<body>

<div class="container">
    <div class="logos">
        <img src="https://raw.githubusercontent.com/Juanlubaz/Enlaces-estructuras-TSP3/main/GESTI.png" alt="Gestiproject Logo" />
    </div>
    
    <h1>Equipment Search</h1>

    <div class="options-box">
        <div class="options-title">Search Criteria</div>
        <div class="options-grid">
            <button type="button" id="btnTag" class="btn-option active" onclick="selectCriteria('tag')">TAG</button>
            <button type="button" id="btnName" class="btn-option" onclick="selectCriteria('name')">EQUIPMENT NAME</button>
        </div>
    </div>

    <div class="search-box-container">
        <input type="text" id="equipmentSearchInput" class="search-input" list="equipmentsList" placeholder="Enter TAG to look for...">
        <datalist id="equipmentsList"></datalist>
    </div>

    <div class="action-grid">
        <button type="button" onclick="executeEquipmentSearch('DATA SHEET')">DATA SHEET</button>
        <button type="button" onclick="executeEquipmentSearch('PLANOS')">PLANOS</button>
        <button type="button" onclick="executeEquipmentSearch('MANUAL')">MANUAL</button>
    </div>

    <a href="principal.html" class="back-link">← Back to Principal</a>
</div>

<script>
    let currentCriteria = 'tag';
    // Diccionario global para indexar toda la fila por cada equipo
    let remoteSheetDatabase = {}; 

    const SHEET_ID = '1xOQPbBJcmm12enAF6ln6s0bC2vAMWAQg';
    // Pedimos las columnas A, C, D y E (Equipo, Data Sheet, Planos, Manual) de forma limpia
    const GOOGLE_SHEET_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tq=SELECT%20A,C,D,E&tqx=responseHandler:processData`;

    function loadDataDynamically() {
        const script = document.createElement('script');
        script.src = GOOGLE_SHEET_URL;
        document.body.appendChild(script);
    }

    function processData(response) {
        if (!response || !response.table || !response.table.rows) {
            console.error("No se pudieron recibir los datos de Google Sheets.");
            return;
        }

        remoteSheetDatabase = {};
        const rows = response.table.rows;

        // Recorremos omitiendo la fila 0 (Cabeceras)
        for (let i = 1; i < rows.length; i++) {
            const row = rows[i];
            if (row.c && row.c[0] && row.c[0].v) {
                const equipoName = row.c[0].v.toString().trim();
                
                if (equipoName) {
                    // Mapeamos los valores de las celdas de forma segura
                    remoteSheetDatabase[equipoName] = {
                        'DATA SHEET': (row.c[1] && row.c[1].v) ? row.c[1].v.toString().trim() : '',
                        'PLANOS':     (row.c[2] && row.c[2].v) ? row.c[2].v.toString().trim() : '',
                        'MANUAL':     (row.c[3] && row.c[3].v) ? row.c[3].v.toString().trim() : ''
                    };
                }
            }
        }

        updateDatalist();
    }

    function updateDatalist() {
        const datalist = document.getElementById('equipmentsList');
        datalist.innerHTML = ''; 

        // Extraemos las llaves del diccionario (nombres de equipos) y las ordenamos
        const sortedEquipments = Object.keys(remoteSheetDatabase).sort();

        sortedEquipments.forEach(equipo => {
            const option = document.createElement('option');
            option.value = equipo;
            datalist.appendChild(option);
        });
    }

    function selectCriteria(criteria) {
        currentCriteria = criteria;
        const btnTag = document.getElementById('btnTag');
        const btnName = document.getElementById('btnName');
        const inputField = document.getElementById('equipmentSearchInput');

        if (criteria === 'tag') {
            btnTag.classList.add('active');
            btnName.classList.remove('active');
            inputField.placeholder = "Enter TAG to look for...";
        } else {
            btnName.classList.add('active');
            btnTag.classList.remove('active');
            inputField.placeholder = "Enter Equipment Name to look for...";
        }
        inputField.focus();
    }

    // LÓGICA DE DIRECCIONAMIENTO DIRECTO A LA CELDA
    function executeEquipmentSearch(columnType) {
        const query = document.getElementById('equipmentSearchInput').value.trim();
        
        if (!query) {
            alert("Por favor, introduce o selecciona un equipo.");
            return;
        }

        // Buscamos si el texto ingresado coincide con un equipo de la base de datos
        const equipmentInfo = remoteSheetDatabase[query];

        if (!equipmentInfo) {
            alert(`El equipo "${query}" no se encuentra en el inventario actual.`);
            return;
        }

        // Extraemos el enlace de la columna correspondiente al botón pulsado
        const targetUrl = equipmentInfo[columnType];

        if (targetUrl && (targetUrl.startsWith('http://') || targetUrl.startsWith('https://'))) {
            // Abre de inmediato el contenido de la celda (enlace a Drive o web) en otra pestaña
            window.open(targetUrl, '_blank');
        } else {
            alert(`El equipo "${query}" no tiene ningún documento registrado en la columna de ${columnType}.`);
        }
    }

    window.onload = loadDataDynamically;
</script>

</body>
</html>
